name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7.0
        ports:
          - "27017:27017"
        env:
          MONGO_INITDB_ROOT_USERNAME: notifyhq
          MONGO_INITDB_ROOT_PASSWORD: notifyhq_secret
        options: >-
          --health-cmd "mongosh --eval \"db.adminCommand('ping')\""
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      rabbitmq:
        image: rabbitmq:3.13-management
        ports:
          - "5672:5672"
        env:
          RABBITMQ_DEFAULT_USER: notifyhq
          RABBITMQ_DEFAULT_PASS: notifyhq_secret
        options: >-
          --health-cmd "rabbitmq-diagnostics ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      APP_ENV: test
      SECRET_KEY: test-secret-key-32-bytes-minimum-xx
      MONGODB_URL: mongodb://notifyhq:notifyhq_secret@localhost:27017/notifyhq?authSource=admin
      MONGODB_DB_NAME: notifyhq_test
      RABBITMQ_URL: amqp://notifyhq:notifyhq_secret@localhost:5672/
      LOG_LEVEL: ERROR
      CORS_ORIGINS: http://localhost:3000
      API_V1_PREFIX: /api/v1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint (ruff)
        run: |
          source .venv/bin/activate
          ruff check .

      - name: Format check (black)
        run: |
          source .venv/bin/activate
          black --check .

      - name: Type check (mypy)
        run: |
          source .venv/bin/activate
          mypy app/

      - name: Run tests
        run: |
          source .venv/bin/activate
          pytest --cov=app --cov-report=term-missing --cov-report=xml --no-cov-on-fail

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
